# Wrangler Configuration for Nahan (نهان) IoT Telemetry Gateway Node
# Docs: https://developers.cloudflare.com/workers/wrangler/configuration/

name = "hoseinnahanv2ray"
main = "worker.js"
compatibility_date = "2024-03-01"

# Automatically run the local dev server on a predictable port
[dev]
port = 8787

# D1 Database Configuration for state & config persistence
# To provision a new D1 database, run: npx wrangler d1 create nahan-db
# Then replace the database_id below with the ID generated by the command.
[[d1_databases]]
binding = "IOT_DB"
database_name = "hhhddhhcc"
database_id = "8e7e77b7-a276-49c9-959c-0f949ab89c7d"

# Environment Variables & Secrets (Optional)
# If you prefer to bind your Relay IP as an environment variable instead of using the panel settings:
# [vars]
# RELAY_IP = "pro.xy.ip.cmliussss.net"
